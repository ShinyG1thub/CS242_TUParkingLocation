# =============================================================
# docker-compose.prod.yml  — PRODUCTION
# รัน: docker compose -f docker-compose.prod.yml up --build
#
# TODO (เมื่อพร้อม deploy):
#   1. สร้าง frontend/Dockerfile.prod (Multi-stage: build แล้ว serve ด้วย Nginx)
#   2. ใส่ Domain หรือ Server IP จริงใน nginx.conf
#   3. เพิ่ม SSL certificate (certbot / Let's Encrypt)
#   4. เปลี่ยน Database จาก SQLite → PostgreSQL
# =============================================================

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    expose:
      - "5000"            # ไม่ expose ออกนอก ให้ nginx เป็น proxy แทน
    environment:
      - FLASK_ENV=production
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod       # TODO: สร้างไฟล์นี้ (Nginx + static build)
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend
    restart: always

