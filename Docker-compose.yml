# =============================================================
# docker-compose.yml  — DEVELOPMENT
# รัน: docker compose up --build
#
# สำหรับ Production ให้ใช้ docker-compose.prod.yml แทน
# =============================================================

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    volumes:
      - .:/app # Hot-reload: แก้ Python แล้วเห็นทันที
      - /app/frontend # ป้องกัน node_modules overwrite
    environment:
      - FLASK_ENV=development
      - FLASK_DEBUG=1

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/frontend # Hot-reload: แก้ React แล้วเห็นทันที
      - /frontend/node_modules # ป้องกัน node_modules overwrite
    depends_on:
      - backend
    environment:
      - VITE_API_URL=http://backend:5000
